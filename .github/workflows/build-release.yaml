  # release
  create-release:
    needs: [update-packagejson]
#    needs: [update-packagejson, publish]
    permissions:
      contents: write
      id-token: write # required for NuGet Trusted Publish
    uses: TeamMoirai/GitHubActions/.github/workflows/create-release.yaml@main
    with:
      commit-id: ${{ needs.update-packagejson.outputs.sha }}
      dry-run: ${{ inputs.dry-run }}
      tag: ${{ inputs.tag }}
      nuget-push: false
      release-upload: false
#      release-upload: true
#      release-asset-path: ./com.moirai.framework.${{ inputs.tag }}.unitypackage/com.moirai.framework.${{ inputs.tag }}.unitypackage
    secrets: inherit

  cleanup:
    if: ${{ needs.update-packagejson.outputs.is-branch-created == 'true' }}
    needs: [update-packagejson, create-release]
    permissions:
      contents: write
    uses: TeamMoirai/GitHubActions/.github/workflows/clean-packagejson-branch.yaml@main
    with:
      branch: ${{ needs.update-packagejson.outputs.branch-name }}