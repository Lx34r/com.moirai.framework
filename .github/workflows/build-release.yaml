name: build-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "tag: git tag you want create. (sample 1.0.0)"
        required: true
      dry-run:
        description: "dry-run: true will never create release/nuget."
        required: true
        default: false
        type: boolean

jobs:
  update-packagejson:
    permissions:
      actions: read
      contents: write
    uses: TeamMoirai/GitHubActions/.github/workflows/update-packagejson.yaml@main
    with:
      file-path: ./package.json
      tag: ${{ inputs.tag }}
      dry-run: ${{ inputs.dry-run }}

